server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # ---------- gzip 壓縮 ----------
  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/xml application/xml+rss
    image/svg+xml font/woff font/woff2;

  # ---------- 安全標頭 ----------
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
  # 註：CSP 因為要連 Google Identity + Unsplash 圖，故僅開常用域名
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com https://lh3.googleusercontent.com; connect-src 'self' https://accounts.google.com; frame-src https://accounts.google.com;" always;

  # 隱藏 nginx 版本號
  server_tokens off;

  # ---------- 靜態資源長快取（Vite 產出帶 hash） ----------
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable, max-age=31536000";
    access_log off;
    try_files $uri =404;
  }

  # ---------- API 反向代理：同源呼叫後端，前端不需處理 CORS ----------
  location /api/ {
    # docker-compose 服務名為 backend；若獨立部署可改 upstream
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
  }

  # ---------- SPA 路由：找不到檔案回 index.html ----------
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ---------- index.html 不快取（確保新版 hash 立刻拿到） ----------
  location = /index.html {
    add_header Cache-Control "no-store, no-cache, must-revalidate";
    add_header X-Content-Type-Options "nosniff" always;
  }
}
